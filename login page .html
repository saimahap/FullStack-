<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pizza Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: #2b2b2b;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main Card */
.container {
    width: 900px;
    height: 500px;
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    background: #1e1e1e;
}

/* LEFT SIDE – IMAGE ONLY */
.left {
    width: 50%;
    background-image: url("pizza.jpeg");
    background-size: cover;       /* FIT perfectly */
    background-position: center;  /* Center image */
    background-repeat: no-repeat; /* No repeat */
    position: relative;
}

/* Curved divider */
.left::after {
    content: "";
    position: absolute;
    right: -40px;
    top: 0;
    width: 80px;
    height: 100%;
    background: #1e1e1e;
    border-radius: 50%;
}

/* RIGHT SIDE – LOGIN */
.right {
    width: 50%;
    padding: 50px;
    color: #fff;
}

.right h2 {
    margin-bottom: 20px;
}

.right label {
    font-size: 14px;
    display: block;
    margin-top: 15px;
    color: #ffb703;
}

.right input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #2c2c2c;
    color: #fff;
}

.options {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin: 15px 0;
    color: #ccc;
}

.options a {
    color: #ccc;
    text-decoration: none;
}

.options a:hover {
    text-decoration: underline;
}

.right button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #ffb703;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.right button:hover {
    background: #e6a600;
}

.footer-text {
    text-align: center;
    font-size: 13px;
    margin-top: 25px;
    color: #aaa;
}

.footer-text a {
    color: #ffb703;
    text-decoration: none;
}

/* Responsive */
@media (max-width: 900px) {
    .container {
        flex-direction: column;
        height: auto;
        width: 90%;
    }

    .left, .right {
        width: 100%;
        height: 250px;
    }

    .left::after {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- IMAGE ONLY -->
    <div class="left"></div>

    <!-- LOGIN FORM -->
    <div class="right">
        <h2>Welcome ! </h2>

        <form>
            <label>Email Address</label>
            <input type="email" placeholder="customer@pizza.com">

            <label>Password</label>
            <input type="password" placeholder="••••••••">

            <div class="options">
                <span><input type="checkbox"> Remember me</span>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit">Sign in</button>

            <div class="footer-text">
                New user? <a href="#">Create Account</a>
            </div>
        </form>
    </div>

</div>

</body>
</html>
