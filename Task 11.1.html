<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to right, #ff9966, #ff5e62);
}

.container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

button {
    padding: 8px 12px;
    border: none;
    background: #ff5e62;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    background: #ff9966;
}

img {
    width: 220px;
    height: 160px;
    border-radius: 10px;
}

h3 {
    margin: 5px;
}
</style>
</head>

<body>

<div class="container">

<h2>🍕 Pizza App</h2>

<button onclick="changeBg()">Change Background</button>

<br><br>

<input type="text" placeholder="Type here..." 
oninput="output.innerText=this.value">
<p id="output"></p>

<input type="password" id="pass">
<br>
<button onclick="toggle()">Show/Hide</button>

<br><br>

<img id="img" src="https://images.unsplash.com/photo-1601924928376-6d8b6f3d0e4f">
<h3 id="title">Cheese Pizza</h3>

<button onclick="change(-1)">⬅</button>
<button onclick="change(1)">➡</button>

<br><br>

<button onclick="update(-1)">-</button>
<span id="num">0</span>
<button onclick="update(1)">+</button>

</div>

<script>

function changeBg(){
    let colors = ["#ff9a9e", "#a18cd1", "#fbc2eb", "#fad0c4"];
    document.body.style.background = colors[Math.floor(Math.random()*colors.length)];
}

// password
function toggle(){
    pass.type = pass.type === "password" ? "text" : "password";
}

// pizza slider
let images = [
 "https://images.unsplash.com/photo-1594007654729-407eedc4be65",
 "https://images.unsplash.com/photo-1604382355076-af4b0eb60143"
];

let names = ["Cheese Pizza", "Veggie Pizza", "Margherita Pizza"];

let i = 0;

function change(x){
    i = (i + x + images.length) % images.length;
    img.src = images[i];
    title.innerText = names[i];
}

// counter
let count = 0;

function update(x){
    count += x;
    num.innerText = count;
}

</script>

</body>
</html>
