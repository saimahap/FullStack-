<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Web App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f5f5f5; }
    .container-box {
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .hidden { display:none; }
  </style>
</head>
<body>


<div class="container-box" id="registerBox">
  <h3 class="text-center">Register</h3>
  <form id="registerForm">
    <input type="text" id="regName" class="form-control mb-2" placeholder="Name" required>
    <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email" required>
    <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password" required>
    <button class="btn btn-primary w-100">Register</button>
  </form>
  <p class="text-center mt-2">Already have account? <a href="#" onclick="showLogin()">Login</a></p>
</div>


<div class="container-box hidden" id="loginBox">
  <h3 class="text-center">Login</h3>
  <form id="loginForm">
    <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email" required>
    <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password" required>
    <button class="btn btn-success w-100">Login</button>
  </form>
  <p class="text-center mt-2"><a href="#" onclick="showRegister()">Create account</a></p>
</div>


<div class="container hidden" id="dashboard">
  <div class="row mt-4">
    <div class="col">
      <h2>Dashboard</h2>
      <button class="btn btn-danger mb-3" onclick="logout()">Logout</button>
      
      <div class="card p-3">
        <h5>User Info</h5>
        <p id="userData"></p>
        <button class="btn btn-info" onclick="toggleData()">Show/Hide Data</button>
      </div>
    </div>
  </div>
</div>

<script>
  let user = {};
  let visible = true;

 
  document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();
    let name = document.getElementById("regName").value;
    let email = document.getElementById("regEmail").value;
    let password = document.getElementById("regPassword").value;

    if(password.length < 6){
      alert("Password must be at least 6 characters");
      return;
    }

    user = {name, email, password};
    alert("Registered Successfully!");
    showLogin();
  });

  
  document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if(email === user.email && password === user.password){
      showDashboard();
    } else {
      alert("Invalid Credentials");
    }
  });

  function showLogin(){
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
  }

  function showRegister(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
  }

  function showDashboard(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("userData").innerText = `Name: ${user.name} | Email: ${user.email}`;
  }

  function logout(){
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
  }

  
  function toggleData(){
    let data = document.getElementById("userData");
    visible = !visible;
    data.style.display = visible ? "block" : "none";
  }
</script>

</body>
</html>
